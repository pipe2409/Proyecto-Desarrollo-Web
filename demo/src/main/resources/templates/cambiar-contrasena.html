<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar Contraseña</title>

  <link rel="stylesheet" th:href="@{/css/index.css}" />
  <link rel="stylesheet" th:href="@{/css/dashboard.css}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: Inter, sans-serif; }
    main { padding-top: 90px; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 24px; }
    .title { font-size: 28px; font-weight: 900; margin: 0 0 14px; }
    .muted { color:#6b7280; margin: 0 0 18px; }
    .field { margin-bottom: 14px; }
    .field label { display:block; font-weight:700; margin-bottom:8px; }
    .inputWrap { display:flex; align-items:center; gap:10px; border:1px solid #d1d5db; border-radius: 14px; padding: 12px 14px; }
    .inputWrap input { border:none; outline:none; width:100%; font-size: 16px; }
    .row { display:flex; gap:14px; }
    .row > div { flex:1; }
    .actions { display:flex; justify-content:flex-end; gap:12px; margin-top: 18px; }
    .btn { border:none; padding: 12px 18px; border-radius: 12px; cursor:pointer; font-weight: 800; }
    .btnPrimary { background:#1f4fbf; color:#fff; }
    .btnGhost { background:#eef2ff; color:#1f4fbf; text-decoration:none; display:inline-flex; align-items:center; }
    .alertOk { background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46; padding:10px 12px; border-radius:12px; margin-bottom: 14px; }
    .alertErr { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; padding:10px 12px; border-radius:12px; margin-bottom: 14px; }
  </style>
</head>

<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <div class="logo-icon">
        <img th:src="@{/images/logoPraia.png}" alt="Hotel Praia Logo" />
      </div>
      <span class="logo-text">Hotel Praia</span>
    </div>

    <div class="nav-links" id="navLinks">
      <a href="/#inicio" class="nav-link">Inicio</a>
      <a href="/#habitaciones" class="nav-link">Habitaciones</a>
      <a href="/#servicios" class="nav-link">Servicios</a>
      <a href="/#galeria" class="nav-link">Galería</a>
      <a href="/#testimonios" class="nav-link">Testimonios</a>
      <a href="/#contacto" class="nav-link">Contacto</a>
      <a href="/#reservas" class="btn-reservar">Reservar</a>
    </div>

    <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main>
  <div class="container">
    <div class="card">

      <h1 class="title">Cambiar contraseña</h1>
      <p class="muted">Actualiza tu contraseña. Debes escribir la contraseña actual para confirmar.</p>

      <div th:if="${param.okPass}" class="alertOk">Contraseña actualizada correctamente.</div>
      <div th:if="${error}" class="alertErr" th:text="${error}">Error</div>

      <form th:action="@{/huespedes/cambiar-contrasena}" method="post">
        <div class="field">
          <label>Contraseña actual</label>
          <div class="inputWrap">
            <span>🔒</span>
            <input type="password" name="actual" required placeholder="••••••••" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Nueva contraseña</label>
            <div class="inputWrap">
              <span>🆕</span>
              <input type="password" name="nueva" required placeholder="••••••••" />
            </div>
          </div>

          <div class="field">
            <label>Confirmar nueva contraseña</label>
            <div class="inputWrap">
              <span>✅</span>
              <input type="password" name="confirmar" required placeholder="••••••••" />
            </div>
          </div>
        </div>

        <div class="actions">
          <a class="btn btnGhost" th:href="@{/huespedes/mi-perfil}">Volver</a>
          <button class="btn btnPrimary" type="submit">Guardar</button>
        </div>
      </form>

    </div>
  </div>
</main>

<script th:src="@{/js/index.js}"></script>
</body>
</html>
