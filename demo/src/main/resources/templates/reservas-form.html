<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${modo == 'crear' ? 'Crear Reserva' : 'Editar Reserva'}"></title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100">

  <header class="border-b border-slate-800 bg-slate-950/70 backdrop-blur">
    <div class="mx-auto max-w-3xl px-4 py-5 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold"
            th:text="${modo == 'crear' ? 'Crear reserva' : 'Editar reserva'}"></h1>
        <p class="text-sm text-slate-400">Modifica los datos de la reserva y guarda.</p>
      </div>
      <a href="/reservas/admin"
         class="rounded-lg border border-slate-800 px-4 py-2 text-sm hover:bg-slate-900 transition">
        Volver
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-8">
    <div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-6">

      <form th:object="${reserva}"
            method="post"
            th:action="${modo == 'crear'} ? @{/reservas/admin/guardar} : @{/reservas/admin/actualizar/{id}(id=${reserva.id})}"
            class="space-y-5">

        <!-- ID oculto en edición -->
        <div th:if="${modo == 'editar'}" class="text-xs text-slate-400">
          Reserva ID: <span class="font-mono" th:text="*{id}"></span>
          <input type="hidden" th:field="*{id}" />
        </div>

        <!-- Huésped y Habitación -->
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm text-slate-300 mb-1">Huésped</label>
            <select name="huespedId"
                    required
                    class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500">
              <option value="" disabled>Selecciona un huésped</option>
              <option th:each="h : ${huespedes}"
                      th:value="${h.id}"
                      th:text="${h.nombre + ' ' + h.apellido + ' — ' + h.correo}"
                      th:selected="${reserva.huesped != null and reserva.huesped.id == h.id}">
              </option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-slate-300 mb-1">Habitación</label>
            <select name="habitacionId"
                    required
                    class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500">
              <option value="" disabled>Selecciona una habitación</option>
              <option th:each="hab : ${habitaciones}"
                      th:value="${hab.id}"
                      th:text="${'Hab. ' + hab.id + ' — ' + (hab.tipoHabitacion != null ? hab.tipoHabitacion.nombre : 'Sin tipo')}"
                      th:selected="${reserva.habitacion != null and reserva.habitacion.id == hab.id}">
              </option>
            </select>
          </div>
        </div>

        <!-- Fechas -->
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm text-slate-300 mb-1">Fecha de inicio (Check-in)</label>
            <input type="datetime-local"
                   name="fechaInicio"
                   required
                   th:value="${#temporals.format(reserva.fechaInicio, 'yyyy-MM-dd''T''HH:mm')}"
                   class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500" />
          </div>

          <div>
            <label class="block text-sm text-slate-300 mb-1">Fecha de fin (Check-out)</label>
            <input type="datetime-local"
                   name="fechaFin"
                   required
                   th:value="${#temporals.format(reserva.fechaFin, 'yyyy-MM-dd''T''HH:mm')}"
                   class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500" />
          </div>
        </div>

        <!-- Personas y Estado -->
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm text-slate-300 mb-1">Cantidad de personas</label>
            <input type="number"
                   th:field="*{cantidadPersonas}"
                   min="1"
                   required
                   class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500"
                   placeholder="1" />
          </div>

          <div>
            <label class="block text-sm text-slate-300 mb-1">Estado</label>
            <select th:field="*{estado}"
                    class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500">
              <option value="PENDIENTE">PENDIENTE</option>
              <option value="CONFIRMADA">CONFIRMADA</option>
              <option value="COMPLETADA">COMPLETADA</option>
              <option value="CANCELADA">CANCELADA</option>
            </select>
          </div>
        </div>

        <!-- Operador (opcional) -->
        <div>
          <label class="block text-sm text-slate-300 mb-1">
            Operador
            <span class="text-slate-500 text-xs ml-1">(opcional)</span>
          </label>
          <select name="operadorId"
                  class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-2 text-sm outline-none focus:border-sky-500">
            <option value="">Sin operador</option>
            <option th:each="op : ${operadores}"
                    th:value="${op.id}"
                    th:text="${op.nombre}"
                    th:selected="${reserva.operador != null and reserva.operador.id == op.id}">
            </option>
          </select>
        </div>

        <!-- Botones -->
        <div class="pt-2 flex gap-2">
          <button type="submit"
                  class="rounded-xl bg-sky-600 px-5 py-2 text-sm font-medium hover:bg-sky-500 transition">
            Guardar
          </button>
          <a href="/reservas/admin"
             class="rounded-xl border border-slate-800 px-5 py-2 text-sm hover:bg-slate-900 transition">
            Cancelar
          </a>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
